<html>

        <title> Emma de la Cruz </title>

        <!-- CSS-->

        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="../assets/images/branding/favicon-logo.png">

        <!-- Font-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">

    </head>
    <body>

        <div class="FlexboxLayout">
            
            <!-- Logo-->
            <div class="HP">    
                <img src="../assets/images/branding/wp-logo.svg" alt="Emma dlC Logo">
            </div>

            <!-- Home page content  -->    
                <div class="MeDesc">
                    Welcome to my personal portfolio! Click any button to get started.
                </div>

        
            <!-- Navigation bar -->
            <nav class="NAV-BAR">
                <span style="cursor: pointer"></span>

                <ul class="Nav-List">
                    <li class="menu-item"><a href="resume.html" target="_self">RESUME</a></li>
                    <li class="menu-item"><a href="experience.html" target="_self">EXPERIENCE</a></li>

                    <li class="menu-item"><a href="contact.html" target="_self">CONTACT ME</a></li>
                </ul>

            </nav>

                <div class="JS">
                    <button id="showTextButton">Last Updated</button>
                    <p id="customText" style="display: none;">3/5/26</p>

                    <script>
                        // Get the button and paragraph elements
                        const button = document.getElementById("showTextButton");
                        const text = document.getElementById("customText");

                        // Add a click event listener to the button
                        button.addEventListener("click", () => {
                        text.style.display = "block"; // Show the text when the button is clicked
                        text.style.color = "white";
                        text.style.margin = 0;
                        });
                    </script>

            </div>
        </div>
        
    </body>
